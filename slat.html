<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>Slat Cutting</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="container">
    <h2>Slat Cutting</h2>

    <!-- ГРУППА 1: Основные детали -->
    <div class="form-group">
      <h4>Детали</h4>
      <input type="number" id="size" placeholder="Размер">
      <input type="number" id="qty" placeholder="Количество">
      <input type="number" id="stock" value="2900" placeholder="Длина заготовки">
      <button onclick="addItem()">Добавить</button>
    </div>

    <!-- ГРУППА 2: Остатки -->
    <div class="form-group">
      <h4>Остатки</h4>
      <input type="number" id="leftoverSize" placeholder="Размер остатка">
      <input type="number" id="leftoverQty" placeholder="Количество остатков">
      <button onclick="addManualLeftover()">+ Добавить остаток</button>
    </div>

    <!-- Таблица -->
    <table id="itemsTable">
      <thead>
        <tr>
          <th>Размер</th>
          <th>Количество</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <!-- Режимы расчёта -->
    <div class="mode-buttons">
      <button onclick="setClassicMode()">📐 Классический расчёт</button>
      <button onclick="setBalanceMode()">⚖️ Баланс склада</button>
    </div>

    <div id="result" class="result"></div>
  </div>

  <script src="slat.js"></script>
</body>

</html>
