<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <title>Slat Cutting</title>
  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <div class="container">
    <h2>Slat Cutting</h2>

    <div class="form-group">
      <input type="number" id="size" placeholder="Размер">
      <input type="number" id="qty" placeholder="Количество">
      <input type="number" id="stock" value="2900" placeholder="Длина заготовки">
      <input type="number" id="manualLeftover" placeholder="Добавить остаток">
      <button onclick="addManualLeftover()">+</button>
      <button onclick="addItem()">Добавить</button>
    </div>

    <table id="itemsTable">
      <thead>
        <tr>
          <th>Размер</th>
          <th>Количество</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <button class="calculate-btn" onclick="calculate()">Показать варианты</button>

    <div id="result" class="result"></div>
  </div>

  <script src="slat.js"></script>
</body>

</html>
